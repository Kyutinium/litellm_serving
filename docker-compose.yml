services:
  gemma4-vllm:
    image: vllm/vllm-openai:gemma4
    container_name: gemma4-vllm
    ipc: host
    ports:
      - "8090:8000"
    volumes:
      - /home/kyvhyvn.shim/to/public/checkpoints/gemma/gemma-4-31B-it:/model
    environment:
      - PYTHONWARNINGS=ignore::FutureWarning
    command:
      - --model
      - /model
      - --tensor-parallel-size
      - "2"
      - --max-model-len
      - "262144"
      - --gpu-memory-utilization
      - "0.90"
      - --dtype
      - bfloat16
      - --trust-remote-code
      - --served-model-name
      - gemma-4-31b-it
      - --limit-mm-per-prompt
      - '{"image": 0, "audio": 0}'
      - --api-key
      - EMPTY
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 2
              capabilities: [gpu]
    restart: unless-stopped

  litellm:
    build: .
    network_mode: host
    depends_on:
      - gemma4-vllm
    environment:
      - LITELLM_MASTER_KEY=sk-1234
      - SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt
      - REQUESTS_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt
      - NO_PROXY=localhost,127.0.0.1
      - no_proxy=localhost,127.0.0.1
      - OPENAI_API_BASE=http://localhost:8088/v1
      - THINK_OUTPUT_MODE=none
